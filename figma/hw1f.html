        <div class="static">

        <div class="absolute"><!--position:absolute позволяет элементу находиться в определенном месте на странице независимо от других элементов-->
            <a>We were studyed algoritms todayon lessons in school
                <a>It was very interesting</a>
        </a>
             
        </div>

        </a>
        <div class="sticky"><!--position:sticky позволяет элементу прилипать к определенной позиции при прокрутке страницы-->
